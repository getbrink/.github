name: Feature request
description: Suggest a new feature or enhancement for Brink
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! Please describe the problem you're trying to solve and what you'd like to see.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you'd like.
      placeholder: I'd like Brink to support...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits and how?
      placeholder: When running agents in production, I need to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered? Why aren't they sufficient?
      placeholder: I considered X, but it doesn't work because...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else — mockups, links to prior art, related issues, etc.
    validations:
      required: false
