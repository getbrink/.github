# Post-release verification smoke.
#
# Triggers AFTER a release is published in any of the MVP image repos.
# Runs the four-flag cosign verify discipline + SBOM + SLSA attestation
# verification against the published image. Catches silent regressions
# where the signature format changes but the verify command in docs is
# stale.
#
# Manual `workflow_dispatch` entry point. The cross-repo release-event
# router lands at v0.2.
#
# Auth note: this workflow lives in getbrink/.github but verifies
# images whose packages are scoped to a different getbrink repo (e.g.
# brink, brink-eval). The default GITHUB_TOKEN does not grant cross-repo
# packages:read. We mint a short-lived GitHub App token via the existing
# `brink-ci-cross-repo-read` App, scoped to the caller repo, and use it
# for the GHCR docker login. The App must be installed on the caller
# repo with at minimum `packages:read` for the package the cosign-verify
# steps fetch.

name: verify-release

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Full image reference, e.g. ghcr.io/getbrink/brink-control-plane:v0.1.0"
        required: true
        type: string
      caller_repository:
        description: "Caller repo whose tag invoked the release, e.g. getbrink/brink"
        required: true
        type: string
      caller_ref:
        description: "Caller ref, e.g. refs/tags/v0.1.0"
        required: true
        type: string

jobs:
  verify:
    name: Cosign verify + SBOM verify + provenance verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Derive caller repo name (strip owner prefix)
        id: derive
        env:
          CALLER_REPOSITORY: ${{ inputs.caller_repository }}
        run: |
          # Extract the bare repo name (e.g. "brink" from "getbrink/brink")
          # for the App-token `repositories:` input.
          echo "repo_name=${CALLER_REPOSITORY##*/}" >> "${GITHUB_OUTPUT}"

      - name: Mint cross-repo GHCR token
        id: ghcr-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BRINK_CI_CROSS_REPO_READ_APP_ID }}
          private-key: ${{ secrets.BRINK_CI_CROSS_REPO_READ_PRIVATE_KEY }}
          owner: getbrink
          repositories: ${{ steps.derive.outputs.repo_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ steps.ghcr-token.outputs.token }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Cosign verify (image signature)
        env:
          IMAGE: ${{ inputs.image }}
          CALLER_REPO: ${{ inputs.caller_repository }}
          CALLER_REF: ${{ inputs.caller_ref }}
        run: |
          cosign verify \
            --certificate-identity='https://github.com/getbrink/.github/.github/workflows/release.yml@refs/heads/main' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-github-workflow-repository="${CALLER_REPO}" \
            --certificate-github-workflow-ref="${CALLER_REF}" \
            "${IMAGE}"

      - name: Cosign verify-attestation (SBOM, SPDX 2.3)
        env:
          IMAGE: ${{ inputs.image }}
          CALLER_REPO: ${{ inputs.caller_repository }}
          CALLER_REF: ${{ inputs.caller_ref }}
        run: |
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity='https://github.com/getbrink/.github/.github/workflows/release.yml@refs/heads/main' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-github-workflow-repository="${CALLER_REPO}" \
            --certificate-github-workflow-ref="${CALLER_REF}" \
            "${IMAGE}"

      - name: Cosign verify-attestation (SLSA v1.0 provenance)
        env:
          IMAGE: ${{ inputs.image }}
          CALLER_REPO: ${{ inputs.caller_repository }}
          CALLER_REF: ${{ inputs.caller_ref }}
        run: |
          cosign verify-attestation \
            --type slsaprovenance1 \
            --certificate-identity='https://github.com/getbrink/.github/.github/workflows/release.yml@refs/heads/main' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-github-workflow-repository="${CALLER_REPO}" \
            --certificate-github-workflow-ref="${CALLER_REF}" \
            "${IMAGE}"
