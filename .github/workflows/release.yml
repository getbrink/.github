# Brink org-wide reusable release workflow.
#
# Builds, pushes, scans, signs, attests, and publishes release notes for a
# single Docker image. Called per-repo from `<repo>/.github/workflows/release.yml`
# on tag push. The reusable location is canonical per [[Architecture Overview
# — What We Are Building v1]] §Repository structure and [[D-Phase4-Cosign-From-V0.1
# v1]] §3 (P6.5 ship).
#
# Steps performed for every release:
#
#   1. Optional sibling-repo checkout when the image's Dockerfile carries
#      a monorepo-parent path-dep (e.g., brink-eval's docker/eval.Dockerfile
#      consumes brink/pkg/contract/python). Sibling checkout uses the
#      `brink-ci-cross-repo-read` GitHub App token; secrets are required
#      only when `sibling_repo` is non-empty.
#
#   2. Build + push the image to ghcr.io/getbrink/<image_name>:<version>
#      and ...:latest, with Docker BuildKit's `provenance=mode=max` for a
#      detailed in-toto provenance statement attached to the manifest.
#
#   3. Trivy scan on the just-pushed digest. CRITICAL CVEs block the
#      workflow before signing; documented MAJOR remediations land in
#      brink-docs/operations/supply-chain.md.
#
#   4. Generate an SPDX 2.3 SBOM via Anchore Syft and attach it to the
#      pushed image digest as a Cosign attestation (--type spdx).
#
#   5. Cosign keyless-sign the image digest via GitHub Actions OIDC.
#      Signature event lands in the Sigstore Rekor public transparency
#      log automatically (default --tlog-upload). Installer v4 ships
#      Cosign v3.x which writes to Rekor v2 via TUF-distributed
#      TrustedRoot — customer cosign-client floor is v2.6.0+ per
#      supply-chain.md prerequisites.
#
#   6. Generate a SLSA Build Level 2 provenance attestation via
#      actions/attest-build-provenance@v2.
#
#   7. Publish release notes via softprops/action-gh-release@v2. Body
#      renders from `.github/RELEASE_TEMPLATE.md` in the getbrink/.github
#      org repo with {{ image_digests }} + {{ cosign_verify_command }}
#      placeholders substituted at workflow time.
#
# Failure mode: fail-fast. No partially-released version where some tags
# are signed and others are not. Trivy CRITICAL or sign failure leaves
# the image pushed but unsigned; customer verify returns "no signatures
# found" and the runbook says DO NOT INSTALL.
#
# Security note: all workflow inputs are typed via `workflow_call` and
# never sourced from `github.event.*` user-controlled fields. Inputs
# that flow into shell `run:` blocks go through `env:` vars per the
# GHA injection-prevention guidance.

name: release

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name under ghcr.io/getbrink/ (e.g. brink-control-plane, eval, eval-prometheus2)."
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile, relative to the build context (e.g. Dockerfile or brink-eval/docker/eval.Dockerfile)."
        required: true
        type: string
      version:
        description: "Image tag (typically github.ref_name; e.g. v0.1.0 or v0.0.0-rc1)."
        required: true
        type: string
      context:
        description: "Build context path relative to $GITHUB_WORKSPACE (default '.'; pass '..' for monorepo-parent context)."
        required: false
        type: string
        default: "."
      platforms:
        description: "Comma-separated docker buildx platforms (default linux/amd64; arm64 lands at v0.2)."
        required: false
        type: string
        default: "linux/amd64"
      maximize_build_space:
        description: "Run jlumbroso/free-disk-space@main before build (required for images >10 GB to free ~25 GB of preinstalled tools)."
        required: false
        type: boolean
        default: false
      caller_path:
        description: "Directory under $GITHUB_WORKSPACE to check out the caller repo (default '' = workspace root). Set to e.g. 'brink-eval' when sibling checkout is needed."
        required: false
        type: string
        default: ""
      sibling_repo:
        description: "Optional sibling repo (without 'getbrink/' prefix) to check out when the Dockerfile carries a monorepo-parent path-dep (e.g. 'brink' for brink-eval's eval.Dockerfile)."
        required: false
        type: string
        default: ""
      sibling_path:
        description: "Destination under $GITHUB_WORKSPACE for the sibling checkout (e.g. 'brink')."
        required: false
        type: string
        default: ""
      trivy_severity:
        description: "Comma-separated Trivy severities that block the workflow. CRITICAL by default per pack [[P6.5]] §3 commitment 8."
        required: false
        type: string
        default: "CRITICAL"
    secrets:
      BRINK_CI_CROSS_REPO_READ_APP_ID:
        description: "GitHub App ID for brink-ci-cross-repo-read App (required only when sibling_repo is set)."
        required: false
      BRINK_CI_CROSS_REPO_READ_PRIVATE_KEY:
        description: "GitHub App private key for brink-ci-cross-repo-read App (required only when sibling_repo is set)."
        required: false
    outputs:
      image_digest:
        description: "Digest of the built+pushed image (sha256:...)."
        value: ${{ jobs.release.outputs.image_digest }}

permissions:
  contents: write
  packages: write
  id-token: write       # cosign keyless OIDC + actions/attest-build-provenance
  attestations: write   # actions/attest-build-provenance

jobs:
  release:
    name: Build, push, scan, sign, attest, publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Free up disk space (large-image builds only)
        if: ${{ inputs.maximize_build_space }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          path: ${{ inputs.caller_path }}

      - name: Mint sibling-repo checkout token
        if: ${{ inputs.sibling_repo != '' }}
        id: sibling-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BRINK_CI_CROSS_REPO_READ_APP_ID }}
          private-key: ${{ secrets.BRINK_CI_CROSS_REPO_READ_PRIVATE_KEY }}
          owner: getbrink
          repositories: ${{ inputs.sibling_repo }}

      - name: Checkout sibling repo
        if: ${{ inputs.sibling_repo != '' }}
        uses: actions/checkout@v4
        with:
          repository: getbrink/${{ inputs.sibling_repo }}
          path: ${{ inputs.sibling_path }}
          token: ${{ steps.sibling-token.outputs.token }}
          fetch-depth: 1

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ghcr.io/getbrink/${{ inputs.image_name }}:${{ inputs.version }}
            ghcr.io/getbrink/${{ inputs.image_name }}:latest
          provenance: mode=max
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,scope=${{ inputs.image_name }},mode=max

      - name: Trivy scan (blocks on ${{ inputs.trivy_severity }})
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ghcr.io/getbrink/${{ inputs.image_name }}@${{ steps.build.outputs.digest }}"
          severity: ${{ inputs.trivy_severity }}
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Cosign sign image (keyless OIDC)
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/getbrink/${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/getbrink/${{ inputs.image_name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: true

      - name: Attach SBOM attestation
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
              --predicate sbom.spdx.json \
              --type spdxjson \
              "ghcr.io/getbrink/${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Generate SLSA v1.0 provenance predicate
        # Build an in-toto SLSA v1.0 provenance predicate that cosign attest
        # signs and pushes to the OCI registry + Rekor in the next step.
        # We emit this manually (instead of via actions/attest-build-provenance@v2)
        # because GitHub's attestation persistence API requires either a public
        # repository or a paid plan for the getbrink org. The cosign-only path
        # produces a signed, Rekor-logged, customer-verifiable SLSA v1.0
        # statement with no GitHub-side dependency.
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ inputs.version }}
          GH_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GH_REF: ${{ github.ref }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_WORKFLOW_REF: ${{ github.workflow_ref }}
          GH_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PYEOF' > slsa-provenance.json
          import json, os
          predicate = {
              "buildDefinition": {
                  "buildType": "https://actions.github.io/buildtypes/workflow/v1",
                  "externalParameters": {
                      "workflow": {
                          "ref": os.environ["GH_REF"],
                          "repository": os.environ["GH_REPO_URL"],
                          # GH_WORKFLOW_REF = "<owner>/<repo>/<workflow-path>@<ref>"
                          # The workflow path is everything after "<owner>/<repo>/".
                          "path": os.environ["GH_WORKFLOW_REF"].split("@")[0].split("/", 2)[2] if "@" in os.environ["GH_WORKFLOW_REF"] else os.environ["GH_WORKFLOW_REF"],
                      },
                  },
                  "internalParameters": {
                      "github": {
                          "event_name": os.environ["GH_EVENT_NAME"],
                          "triggering_actor": os.environ["GH_TRIGGERING_ACTOR"],
                      },
                  },
                  "resolvedDependencies": [
                      {
                          "uri": f"git+{os.environ['GH_REPO_URL']}@{os.environ['GH_REF']}",
                          "digest": {"gitCommit": os.environ["GH_SHA"]},
                      },
                  ],
              },
              "runDetails": {
                  "builder": {
                      "id": f"https://github.com/getbrink/.github/.github/workflows/release.yml@refs/heads/main",
                  },
                  "metadata": {
                      "invocationId": f"{os.environ['GH_REPO_URL']}/actions/runs/{os.environ['GH_RUN_ID']}/attempts/{os.environ['GH_RUN_ATTEMPT']}",
                  },
              },
          }
          json.dump(predicate, open("/dev/stdout", "w"), indent=2)
          PYEOF

      - name: Attach SLSA v1.0 provenance attestation
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
              --predicate slsa-provenance.json \
              --type slsaprovenance1 \
              "ghcr.io/getbrink/${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Cosign self-verify (signature + SBOM + SLSA)
        # I2 (Phase 6 rules): verification is BOTH a sign step AND a verify
        # step in the SAME workflow. Catches identity/OIDC drift before the
        # release is announced as published.
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          IMAGE_REF="ghcr.io/getbrink/${IMAGE_NAME}@${IMAGE_DIGEST}"
          CERT_IDENTITY_REGEXP='^https://github.com/getbrink/[^/]+/\.github/workflows/release\.yml@refs/tags/v[0-9].*$'
          OIDC_ISSUER='https://token.actions.githubusercontent.com'

          echo "::group::Verify image signature"
          cosign verify \
            --certificate-identity-regexp="${CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            "${IMAGE_REF}" > /dev/null
          echo "OK: signature verified."
          echo "::endgroup::"

          echo "::group::Verify SBOM attestation (SPDX-JSON)"
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp="${CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            "${IMAGE_REF}" > /dev/null
          echo "OK: SBOM attestation verified."
          echo "::endgroup::"

          echo "::group::Verify SLSA v1.0 provenance attestation"
          cosign verify-attestation \
            --type slsaprovenance1 \
            --certificate-identity-regexp="${CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            "${IMAGE_REF}" > /dev/null
          echo "OK: SLSA v1.0 provenance verified."
          echo "::endgroup::"

      - name: Render release notes from org template
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ inputs.version }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/getbrink/.github/main/.github/RELEASE_TEMPLATE.md > /tmp/template.md
          python3 - <<'PYEOF' > release_notes.md
          import os
          template = open('/tmp/template.md').read()
          name = os.environ['IMAGE_NAME']
          digest = os.environ['IMAGE_DIGEST']
          version = os.environ['VERSION']
          digest_row = f"| `ghcr.io/getbrink/{name}` | `{digest}` |"
          verify_cmd = (
              "cosign verify \\\n"
              "  --certificate-identity-regexp='^https://github.com/getbrink/[^/]+/\\.github/workflows/release\\.yml@refs/tags/v[0-9].*$' \\\n"
              "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \\\n"
              f"  ghcr.io/getbrink/{name}@{digest}"
          )
          body = (template
              .replace('{{ image_digests }}', digest_row)
              .replace('{{ cosign_verify_command }}', verify_cmd)
              .replace('{{ version }}', version)
              .replace('{{ image_name }}', name)
          )
          print(body)
          PYEOF

      - name: Publish release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: sbom.spdx.json
          append_body: true
          fail_on_unmatched_files: false
