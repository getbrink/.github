# Brink org-wide reusable ship-discipline workflow.
#
# Enforces the cultural rule: a PR that modifies a customer-facing surface
# cannot merge to main unless paired with an open or merged brink-docs PR
# linked from the engineering PR body.
#
# Mechanism is labels-driven, not file-path-driven. The PR author asserts
# "this change touches a customer surface" by applying the
# `customer-surface-impact` label; codeowners override with `bug-fix`,
# `refactor`, or `internal-only`.
#
# Called per-repo from `<repo>/.github/workflows/ship-discipline.yml` on
# pull_request events. The caller pins this workflow's ref (typically
# `@main`) and triggers on `[opened, edited, labeled, unlabeled,
# synchronize]` so the gate re-evaluates whenever the labels, body, or
# diff change.
#
# Gate logic (in order):
#
#   1. If the PR carries any exception label (`bug-fix`, `refactor`,
#      `internal-only`) the gate PASSES. Exception labels are codeowner
#      overrides; branch-protection enforces that codeowners gate label
#      changes.
#
#   2. If the PR does NOT carry `customer-surface-impact` the gate
#      PASSES. The author has not asserted a ship-discipline-triggering
#      change.
#
#   3. If the PR carries `customer-surface-impact` the gate scans the PR
#      body for a `getbrink/brink-docs/pull/<n>` link. The linked docs PR
#      is fetched via the REST API. The gate PASSES when the docs PR is
#      merged, or open and not draft. The gate FAILS when no link is
#      present, the docs PR is closed without merge, draft, or otherwise
#      unreachable.
#
# Failure mode: the job fails with an explicit message naming what to do
# next (apply an exception label with codeowner sign-off, or open and link
# a brink-docs PR).
#
# Security note: the PR body is read inside the actions/github-script JS
# sandbox via context.payload — never interpolated into a shell `run:`
# block, so the standard GHA template-injection vector does not apply.
# Cross-repo docs PR lookup uses the default GITHUB_TOKEN; brink-docs is
# public, so anonymous reads suffice even on PRs from forks.

name: ship-discipline

on:
  workflow_call:
    inputs:
      docs_repo:
        description: "Owner/name of the docs repo whose PR links are accepted as a pair (default 'getbrink/brink-docs')."
        required: false
        type: string
        default: "getbrink/brink-docs"
      trigger_label:
        description: "Label the PR author applies to assert a customer-surface-impact change. The gate is a no-op unless this label is present."
        required: false
        type: string
        default: "customer-surface-impact"
      exception_labels:
        description: "Comma-separated codeowner-override labels. A PR carrying any of these PASSES regardless of the trigger label."
        required: false
        type: string
        default: "bug-fix,refactor,internal-only"

permissions:
  pull-requests: read
  contents: read

jobs:
  ship-discipline:
    name: Paired brink-docs PR required when customer-surface-impact
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Evaluate ship-discipline gate
        uses: actions/github-script@v7
        env:
          DOCS_REPO: ${{ inputs.docs_repo }}
          TRIGGER_LABEL: ${{ inputs.trigger_label }}
          EXCEPTION_LABELS: ${{ inputs.exception_labels }}
        with:
          script: |
            const docsRepo = process.env.DOCS_REPO;
            const triggerLabel = process.env.TRIGGER_LABEL;
            const exceptionLabels = process.env.EXCEPTION_LABELS
              .split(',')
              .map(s => s.trim())
              .filter(Boolean);

            const [docsOwner, docsName] = docsRepo.split('/');
            if (!docsOwner || !docsName) {
              core.setFailed(`docs_repo input must be 'owner/name', got '${docsRepo}'`);
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Workflow must be called from a pull_request event.');
              return;
            }

            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const labels = labelData.map(l => l.name);
            core.info(`PR #${pr.number} labels: ${labels.join(', ') || '(none)'}`);

            const matchedException = labels.find(l => exceptionLabels.includes(l));
            if (matchedException) {
              core.info(`PASS: exception label '${matchedException}' applied.`);
              return;
            }

            if (!labels.includes(triggerLabel)) {
              core.info(`PASS: PR does not carry '${triggerLabel}'; ship-discipline is a no-op.`);
              return;
            }

            const body = pr.body || '';
            const linkPattern = new RegExp(
              `${docsOwner}/${docsName}/pull/(\\d+)`,
              'g'
            );
            const matches = [...body.matchAll(linkPattern)].map(m => Number(m[1]));
            if (matches.length === 0) {
              core.setFailed(
                `FAIL: PR carries '${triggerLabel}' but body has no link to a ${docsRepo} PR. ` +
                `Either link a paired ${docsRepo} PR in the body, or have a codeowner apply ` +
                `one of: ${exceptionLabels.join(', ')}.`
              );
              return;
            }

            const seen = new Set();
            const pairable = [];
            const unpairable = [];
            for (const num of matches) {
              if (seen.has(num)) continue;
              seen.add(num);
              try {
                const { data: docsPr } = await github.rest.pulls.get({
                  owner: docsOwner,
                  repo: docsName,
                  pull_number: num,
                });
                const summary = `${docsRepo}#${num} state=${docsPr.state} draft=${docsPr.draft} merged=${docsPr.merged}`;
                if (docsPr.merged) {
                  pairable.push(summary);
                } else if (docsPr.state === 'open' && !docsPr.draft) {
                  pairable.push(summary);
                } else {
                  unpairable.push(summary);
                }
              } catch (err) {
                unpairable.push(`${docsRepo}#${num} unreachable (${err.status || 'error'})`);
              }
            }

            if (pairable.length > 0) {
              core.info(`PASS: paired docs PR(s) — ${pairable.join('; ')}.`);
              return;
            }

            core.setFailed(
              `FAIL: PR carries '${triggerLabel}' but no linked ${docsRepo} PR is open-and-ready or merged. ` +
              `Seen: ${unpairable.join('; ')}. Either link a different ${docsRepo} PR, ` +
              `move the linked docs PR out of draft, or have a codeowner apply one of: ` +
              `${exceptionLabels.join(', ')}.`
            );
